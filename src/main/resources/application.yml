server:
  port: 8080
  forward-headers-strategy: framework
  tomcat:
    connection-timeout: 5m

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        generate_statistics: true
  datasource:
    url: ${MYSQL_URL}
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  sql:
    init:
      mode: always
      encoding: utf-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    aws:
      s3:
        access-key: ${AWS_S3_ACCESS_KEY}
        secret-key: ${AWS_S3_SECRET_KEY}
        bucket: ${AWS_S3_BUCKET}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:molip-migration}
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
      enable-auto-commit: false
    producer:
      acks: ${KAFKA_PRODUCER_ACKS:all}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: ${KAFKA_LISTENER_ACK_MODE:manual}


jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: ${ACCESS_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${REFRESH_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED}
    path: /v3/api-docs
    groups.enabled: true

  swagger-ui:
    enabled: ${SWAGGER_ENABLED}
    path: /swagger-ui.html
    display-request-duration: true
    persistAuthorization: true

swagger:
  enabled: ${SWAGGER_ENABLED}


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    enable:
      hibernate: true
    tags:
      application: molip
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

ai:
  planner:
    base-url: ${AI_PLANNER_BASE_URL}
    path: ${AI_PLANNER_PATH}
    timeout-ms: ${AI_PLANNER_TIMEOUT_MS}


fcm:
  enabled: ${FCM_ENABLED}
  project-id: ${FCM_PROJECT_ID}
  credentials-json: ${FCM_CREDENTIALS_JSON}

notification:
  dispatch:
    fixed-delay-ms: ${NOTIFICATION_DISPATCH_DELAY_MS}
    batch-size: ${NOTIFICATION_DISPATCH_BATCH_SIZE}


migration:
  enabled: ${MIGRATION_ENABLED:false}
  datasource:
    url: ${MIGRATION_DB_URL:jdbc:mysql://localhost:3306/migration}
    username: ${MIGRATION_DB_USERNAME:migration}
    password: ${MIGRATION_DB_PASSWORD:migration}

kafka:
  enabled: ${KAFKA_ENABLED:false}
  producer:
    enabled: ${KAFKA_PRODUCER_ENABLED:false}
  consumer:
    enabled: ${KAFKA_CONSUMER_ENABLED:false}
  outbox:
    fixed-delay-ms: ${KAFKA_OUTBOX_FIXED_DELAY_MS:5000}
    batch-size: ${KAFKA_OUTBOX_BATCH_SIZE:200}
    dlq:
      fixed-delay-ms: ${KAFKA_OUTBOX_DLQ_FIXED_DELAY_MS:15000}
      batch-size: ${KAFKA_OUTBOX_DLQ_BATCH_SIZE:200}
    retry:
      fixed-delay-ms: ${KAFKA_OUTBOX_RETRY_FIXED_DELAY_MS:10000}
      delay-ms: ${KAFKA_OUTBOX_RETRY_DELAY_MS:60000}
      max-attempts: ${KAFKA_OUTBOX_RETRY_MAX_ATTEMPTS:5}
      batch-size: ${KAFKA_OUTBOX_RETRY_BATCH_SIZE:200}
  topics:
    domain-events: ${KAFKA_DOMAIN_EVENTS_TOPIC:domain.events.v1}
    dlq: ${KAFKA_DOMAIN_EVENTS_DLQ_TOPIC:domain.events.v1.DLQ}
