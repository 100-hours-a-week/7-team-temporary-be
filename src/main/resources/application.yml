server:
  port: 8080
  forward-headers-strategy: framework
  tomcat:
    mbeanregistry:
      enabled: true
    connection-timeout: 5m

spring:
  batch:
    job:
      enabled: ${SPRING_BATCH_JOB_ENABLED}
  datasource:
    url: ${WRITE_DB_URL}
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${WRITE_DB_USERNAME}
    password: ${WRITE_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        generate_statistics: true
  sql:
    init:
      mode: never
      encoding: utf-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    aws:
      s3:
        access-key: ${AWS_S3_ACCESS_KEY}
        secret-key: ${AWS_S3_SECRET_KEY}
        bucket: ${AWS_S3_BUCKET}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:molip-migration}
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
      enable-auto-commit: false
    producer:
      acks: ${KAFKA_PRODUCER_ACKS:all}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: ${KAFKA_LISTENER_ACK_MODE:manual}
  data:
    redis:
      enabled: true
      mode: ${REDIS_MODE:standalone}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      sentinel:
        master: ${REDIS_SENTINEL_MASTER:mymaster}
        nodes: ${REDIS_SENTINEL_NODES:localhost:26379}


jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: ${ACCESS_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${REFRESH_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED}
    path: /v3/api-docs
    groups.enabled: true

  swagger-ui:
    enabled: ${SWAGGER_ENABLED}
    path: /swagger-ui.html
    display-request-duration: true
    persistAuthorization: true
    csrf:
      enabled: true

swagger:
  enabled: ${SWAGGER_ENABLED}


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    enable:
      hibernate: true
    tags:
      application: molip
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

ai:
  planner:
    base-url: ${AI_PLANNER_BASE_URL}
    path: ${AI_PLANNER_PATH}
    timeout-ms: ${AI_PLANNER_TIMEOUT_MS}
  report:
    weekly-generate-path: ${AI_WEEKLY_REPORT_GENERATE_PATH}
    weekly-fetch-path: ${AI_WEEKLY_REPORT_FETCH_PATH}
    timeout-ms: ${AI_WEEKLY_REPORT_TIMEOUT_MS}
  personalization:
    path: ${AI_PERSONALIZATION_INGEST_PATH}
  datasource:
    url: ${AI_DB_URL}
    username: ${AI_DB_USERNAME}
    password: ${AI_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  chatbot:
    base-url: ${AI_CHATBOT_BASE_URL}
    respond-path: ${AI_CHATBOT_RESPOND_PATH}
    cancel-path: ${AI_CHATBOT_CANCEL_PATH}
    stream-path: ${AI_CHATBOT_STREAM_PATH}
    connect-timeout-ms: ${AI_CHATBOT_CONNECT_TIMEOUT_MS:10000}
    respond-timeout-ms: ${AI_CHATBOT_RESPOND_TIMEOUT_MS:300000}
    stream-timeout-ms: ${AI_CHATBOT_STREAM_TIMEOUT_MS:300000}


fcm:
  enabled: ${FCM_ENABLED}
  project-id: ${FCM_PROJECT_ID}
  credentials-json: ${FCM_CREDENTIALS_JSON}

notification:
  consumer:
    enabled: ${NOTIFICATION_CONSUMER_ENABLED}
  producer:
    enabled: ${NOTIFICATION_PRODUCER_ENABLED}
  dispatch:
    fixed-delay-ms: ${NOTIFICATION_DISPATCH_DELAY_MS}
    batch-size: ${NOTIFICATION_DISPATCH_BATCH_SIZE}
  kafka:
    consumer:
      group-id: ${NOTIFICATION_KAFKA_CONSUMER_GROUP_ID}
    topics:
      requested: ${NOTIFICATION_KAFKA_TOPIC_REQUESTED}

batch:
  weekly:
    report-fetch:
      initial-delay-ms: ${BATCH_WEEKLY_REPORT_FETCH_INITIAL_DELAY_MS:1800000}
      poll-interval-ms: ${BATCH_WEEKLY_REPORT_FETCH_POLL_INTERVAL_MS:1800000}
      max-attempts: ${BATCH_WEEKLY_REPORT_FETCH_MAX_ATTEMPTS:10}


migration:
  enabled: ${MIGRATION_ENABLED}
  consumer:
    enabled: ${MIGRATION_CONSUMER_ENABLED:false}
  datasource:
    url: ${MIGRATION_DB_URL}
    username: ${MIGRATION_DB_USERNAME}
    password: ${MIGRATION_DB_PASSWORD}

app:
  datasource:
    read:
      url: ${READ_DB_URL}
      driverClassName: com.mysql.cj.jdbc.Driver
      username: ${READ_DB_USERNAME}
      password: ${READ_DB_PASSWORD}
      hikari:
        pool-name: ${READ_DB_POOL_NAME:read-hikari-pool}
        maximum-pool-size: ${READ_DB_MAX_POOL_SIZE:30}
        minimum-idle: ${READ_DB_MIN_IDLE:10}
        connection-timeout: ${READ_DB_CONNECTION_TIMEOUT_MS:3000}
        validation-timeout: ${READ_DB_VALIDATION_TIMEOUT_MS:1000}
        idle-timeout: ${READ_DB_IDLE_TIMEOUT_MS:600000}
        max-lifetime: ${READ_DB_MAX_LIFETIME_MS:1800000}
        leak-detection-threshold: ${READ_DB_LEAK_DETECTION_MS:0}
    write:
      url: ${WRITE_DB_URL}
      driverClassName: com.mysql.cj.jdbc.Driver
      username: ${WRITE_DB_USERNAME}
      password: ${WRITE_DB_PASSWORD}
      hikari:
        pool-name: ${WRITE_DB_POOL_NAME:write-hikari-pool}
        maximum-pool-size: ${WRITE_DB_MAX_POOL_SIZE:30}
        minimum-idle: ${WRITE_DB_MIN_IDLE:10}
        connection-timeout: ${WRITE_DB_CONNECTION_TIMEOUT_MS:3000}
        validation-timeout: ${WRITE_DB_VALIDATION_TIMEOUT_MS:1000}
        idle-timeout: ${WRITE_DB_IDLE_TIMEOUT_MS:600000}
        max-lifetime: ${WRITE_DB_MAX_LIFETIME_MS:1800000}
        leak-detection-threshold: ${WRITE_DB_LEAK_DETECTION_MS:0}

kafka:
  enabled: ${KAFKA_ENABLED:false}
  producer:
    enabled: ${KAFKA_PRODUCER_ENABLED:false}
  consumer:
    enabled: ${KAFKA_CONSUMER_ENABLED:false}
    dlq:
      max-attempts: ${KAFKA_CONSUMER_DLQ_MAX_ATTEMPTS:10}
      backoff-ms: ${KAFKA_CONSUMER_DLQ_BACKOFF_MS:0}
      republish-enabled: ${KAFKA_CONSUMER_DLQ_REPUBLISH_ENABLED:true}
      republish-delay-ms: ${KAFKA_CONSUMER_DLQ_REPUBLISH_DELAY_MS:1000}
  outbox:
    fixed-delay-ms: ${KAFKA_OUTBOX_FIXED_DELAY_MS:5000}
    batch-size: ${KAFKA_OUTBOX_BATCH_SIZE:200}
    dlq:
      fixed-delay-ms: ${KAFKA_OUTBOX_DLQ_FIXED_DELAY_MS:15000}
      batch-size: ${KAFKA_OUTBOX_DLQ_BATCH_SIZE:200}
    retry:
      fixed-delay-ms: ${KAFKA_OUTBOX_RETRY_FIXED_DELAY_MS:10000}
      delay-ms: ${KAFKA_OUTBOX_RETRY_DELAY_MS:60000}
      max-attempts: ${KAFKA_OUTBOX_RETRY_MAX_ATTEMPTS:5}
      batch-size: ${KAFKA_OUTBOX_RETRY_BATCH_SIZE:200}
  topics:
    domain-events: ${KAFKA_DOMAIN_EVENTS_TOPIC:domain.events.v1}
    dlq: ${KAFKA_DOMAIN_EVENTS_DLQ_TOPIC:domain.events.v1.DLQ}


livekit:
  url: ${LIVEKIT_URL}
  api-key: ${LIVEKIT_API_KEY}
  api-secret: ${LIVEKIT_API_SECRET}
  webhook-secret: ${LIVEKIT_WEBHOOK_SECRET}
  stun-urls: ${LIVEKIT_STUN_URLS}
  turn-urls: ${LIVEKIT_TURN_URLS}
  token-ttl-seconds: ${LIVEKIT_TOKEN_TTL_SECONDS:1800}

webrtc:
  session-sync-enabled: ${WEBRTC_SESSION_SYNC_ENABLED:true}
  session-sync-retry-max: ${WEBRTC_SESSION_SYNC_RETRY_MAX:3}
  session-sync-backoff-ms: ${WEBRTC_SESSION_SYNC_BACKOFF_MS:500}
  presence-ttl-seconds: ${WEBRTC_PRESENCE_TTL_SECONDS:45}
  log-verbose: ${WEBRTC_LOG_VERBOSE:false}
  metrics-enabled: ${WEBRTC_METRICS_ENABLED:true}

chat:
  presence-ttl-seconds: ${CHAT_PRESENCE_TTL_SECONDS:45}
