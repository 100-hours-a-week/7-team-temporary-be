spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:molip-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driverClassName: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: create-drop
  cloud:
    aws:
      s3:
        access-key: test-access-key
        secret-key: test-secret-key
        bucket: test-bucket
  data:
    redis:
      enabled: false
      mode: standalone
      host: localhost
      port: 6379
      password:
      sentinel:
        master: mymaster
        nodes: localhost:26379
  batch:
    job:
      enabled: false

app:
  datasource:
    read:
      url: jdbc:h2:mem:molip-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
      driverClassName: org.h2.Driver
      username: sa
      password:
    write:
      url: jdbc:h2:mem:molip-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
      driverClassName: org.h2.Driver
      username: sa
      password:

migration:
  enabled: false
  consumer:
    enabled: false

jwt:
  secret: test-secret-key-test-secret-key-test-secret-key-test-secret-key
  access-expiration-ms: 3600000
  refresh-expiration-ms: 86400000

ai:
  planner:
    base-url: http://localhost
    path: /test/planner
    timeout-ms: 300000
  report:
    weekly-generate-path: weeklytest
    weekly-fetch-path: weeklyfetchtest
    timeout-ms: 300000
  personalization:
    path: testtest
  datasource:
    url: jdbc:h2:mem:molip-ai-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driverClassName: org.h2.Driver
    username: sa
    password:
  chatbot:
    base-url: http://localhost
    respond-path: respond-test
    cancel-path: cancel-test
    stream-path: stream-test
    connect-timeout-ms: 10000
    respond-timeout-ms: 300000
    stream-timeout-ms: 300000


fcm:
  enabled: false
  project-id: test-id
  credentials-json: test-json

notification:
  consumer:
    enabled: false
  producer:
    enabled: false
  dispatch:
    fixed-delay-ms: 60000
    batch-size: 100
  kafka:
    consumer:
      group-id: test-notification-consumer
    topics:
      requested: notification.requested.v1

batch:
  weekly:
    report-fetch:
      initial-delay-ms: 0
      poll-interval-ms: 0
      max-attempts: 1


springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
    groups.enabled: true

  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    display-request-duration: true
    persistAuthorization: true

swagger:
  enabled: false


livekit:
  url: url
  api-key: apikey
  api-secret: apisecretkey
  webhook-secret: webhooksecret
  stun-urls: stunurl
  turn-urls: turnurl
  token-ttl-seconds: 1800

webrtc:
  session-sync-enabled: false
  session-sync-retry-max: 0
  session-sync-backoff-ms: 500
  log-verbose: false
  metrics-enabled: false

chat:
  presence-ttl-seconds: 45
