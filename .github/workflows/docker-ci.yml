name: CI

on:
  pull_request:
    branches:
      - docker-ci-cd
  push: # temp
    branches:
      - docker-ci-cd
#      - develop
#      - main
#      - "release/**"
#      - "hotㄷfix/**"

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 빌드 & 테스트
      - name: Build and Test
        run: ./gradlew clean build -x spotlessJava --no-daemon

      # 테스트 커버리지
      - name: Test Coverage
        run: ./gradlew jacocoTestReport jacocoTestCoverageVerification --no-daemon

      # 정적 분석
      - name: Code Quality - PMD
        run: ./gradlew pmdMain pmdTest --no-daemon

      - name: Code Quality - SpotBugs
        run: ./gradlew spotbugsMain spotbugsTest --no-daemon

      # CodeQL 보안 분석 (main, release만)
      - name: Initialize CodeQL
        if: github.base_ref == 'main' || startsWith(github.base_ref, 'release/')
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Perform CodeQL Analysis
        if: github.base_ref == 'main' || startsWith(github.base_ref, 'release/')
        uses: github/codeql-action/analyze@v3

      # 리포트 업로드 (실패 시)
      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test/

      - name: Upload Code Quality Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-reports
          path: |
            build/reports/pmd/
            build/reports/spotbugs/

      # 커버리지 리포트 (성공 시)
      - name: Upload Coverage Report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: local/spring-app:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: always()

    steps:
      - name: Notify CI result
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          HEAD="${{ github.head_ref }}"
          BASE="${{ github.base_ref }}"
          ACTOR="${{ github.actor }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [ "${{ needs.test.result }}" = "success" ] && [ "${{ needs.docker-build.result }}" = "success" ]; then
            STATUS="✅ CI 성공"
          else
            STATUS="🚨 CI 실패"
          fi

          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"$STATUS\nRepo: ${{ github.repository }}\nPR #${PR_NUM} (${HEAD} → ${BASE})\nActor: $ACTOR\nCommit: $SHORT_SHA\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" || true
