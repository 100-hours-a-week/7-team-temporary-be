name: CD Staging

on:
  push:
    branches:
      - docker-ci-cd
#      - "release/**"
#      - "hotfix/**"

env:
  AWS_REGION: ap-northeast-2
  ECR_REPO: ${{ secrets.AWS_ECR_REPO }}
  STAGE: stg

jobs:
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute version + tag
        id: meta
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME}"

        # e.g. release/v1.4.3 or hotfix/v1.4.3 → v1.4.3
          VERSION=$(echo "$BRANCH" | sed -E 's|^(release|hotfix)/||')

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version branch: $BRANCH"
            exit 1
          fi

          SHA=$(git rev-parse --short=7 HEAD)
          TAG="${{ env.STAGE }}-${VERSION}-${SHA}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          echo "Build Tag: $TAG"

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.STAGE }}-current
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Jenkins Deploy
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Trigger Jenkins (Staging)
        run: |
          set -euo pipefail

          IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}"

          for svc in task chat; do
            echo "Trigger deploy → $svc ($IMAGE_TAG)"
            curl -sSf -X POST "${{ secrets.JENKINS_URL }}/job/backend/buildWithParameters" \
              --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
              --data "service=${svc}" \
              --data "stage=stg" \
              --data "image_tag=${IMAGE_TAG}"
          done

