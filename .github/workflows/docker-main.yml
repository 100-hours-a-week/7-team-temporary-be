name: CD Production

on:
  push:
    branches:
#      - docker-ci-cd
      - main

env:
  AWS_REGION: ap-northeast-2
  ECR_REPO: molip/be

jobs:
  promote:
    name: Promote Image to Prod
    runs-on: ubuntu-latest

    outputs:
      prod_tag: ${{ steps.promote.outputs.prod_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Extract release version
        id: meta
        run: |
          set -euo pipefail
          MSG="$(git log -1 --pretty=%B)"
          BRANCH=$(echo "$MSG" | sed -n 's|.*\(release/v[0-9]\+\.[0-9]\+\.[0-9]\+\).*|\1|p')
          if [ -z "$BRANCH" ]; then
            BRANCH=$(echo "$MSG" | sed -n 's|.*\(hotfix/v[0-9]\+\.[0-9]\+\.[0-9]\+\).*|\1|p')
          fi
          if [ -z "$BRANCH" ]; then
            echo "Cannot detect release/hotfix branch from merge commit"
            exit 1
          fi
          VERSION=$(echo "$BRANCH" | sed -E 's|^(release|hotfix)/||')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release Branch: $BRANCH"
          echo "Version: $VERSION"

      - name: Get release HEAD SHA
        id: sha
        run: |
          set -euo pipefail

          # 브랜치가 삭제됐을 수 있으므로 fetch 실패 시 merge commit의 parent에서 추출
          if git fetch origin "${{ steps.meta.outputs.branch }}" 2>/dev/null; then
            SHA=$(git rev-parse --short=7 "origin/${{ steps.meta.outputs.branch }}")
          else
            echo "Branch already deleted, extracting SHA from merge commit parent"
            SHA=$(git rev-parse --short=7 HEAD^2 2>/dev/null || git rev-parse --short=7 HEAD)
          fi

          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Release SHA: $SHA"

      - name: Promote staging image to prod
        id: promote
        run: |
          set -euo pipefail

          VERSION="${{ steps.meta.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha }}"

          STG_TAG="stg-${VERSION}-${SHA}"
          PROD_TAG="prod-${VERSION}-${SHA}"

          echo "Promoting: $STG_TAG → $PROD_TAG"

          DIGEST=$(aws ecr describe-images \
            --repository-name "${{ env.ECR_REPO }}" \
            --image-ids imageTag="$STG_TAG" \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "Staging image not found: $STG_TAG"
            exit 1
          fi

          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "${{ env.ECR_REPO }}" \
            --image-ids imageDigest="$DIGEST" \
            --query 'images[0].imageManifest' \
            --output text)

          # immutable prod tag
          aws ecr put-image \
            --repository-name "${{ env.ECR_REPO }}" \
            --image-tag "$PROD_TAG" \
            --image-manifest "$MANIFEST"

          # prod-current 이동
          aws ecr put-image \
            --repository-name "${{ env.ECR_REPO }}" \
            --image-tag prod-current \
            --image-manifest "$MANIFEST"

          echo "prod_tag=$PROD_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: promote

    steps:
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy task then chat
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ needs.promote.outputs.prod_tag }}"
          
          for svc in task chat; do
            echo "=== $svc 배포 시작 ==="
          
            QUEUE_URL=$(curl -sSf -X POST \
              "${{ secrets.JENKINS_URL }}/job/backend-prod/buildWithParameters" \
              --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
              --data "service=${svc}" \
              --data "image_tag=${IMAGE_TAG}" \
              -D - -o /dev/null | grep -i Location | tr -d '\r' | awk '{print $2}')
          
            echo "Queue: $QUEUE_URL"
          
            BUILD_NUM=""
            for i in $(seq 1 30); do
              BUILD_NUM=$(curl -sSf "${QUEUE_URL}api/json" \
                --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
                | jq -r '.executable.number // empty' 2>/dev/null || true)
              if [ -n "$BUILD_NUM" ]; then
                echo "Build #$BUILD_NUM 시작"
                break
              fi
              sleep 5
            done
          
            if [ -z "$BUILD_NUM" ]; then
              echo "$svc 빌드 번호 못 받음!"
              exit 1
            fi
          
            for i in $(seq 1 60); do
              RESULT=$(curl -sSf \
                "${{ secrets.JENKINS_URL }}/job/backend-prod/${BUILD_NUM}/api/json" \
                --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
                | jq -r '.result // empty' 2>/dev/null || true)
          
              if [ "$RESULT" = "SUCCESS" ]; then
                echo "$svc 배포 성공!"
                break
              elif [ "$RESULT" = "FAILURE" ] || [ "$RESULT" = "ABORTED" ]; then
                echo "$svc 배포 실패!"
                exit 1
              fi
              echo "대기 중... ($i/60)"
              sleep 10
            done
          done
