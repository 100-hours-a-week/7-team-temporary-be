name: CD Staging

on:
  push:
    branches:
      - "k8s-deploy"
      - "release/**"
      - "hotfix/**"

env:
  # 변경: ECR → Private Registry
  REGISTRY: ${{ secrets.REGISTRY_URL }}
  IMAGE_NAME: molip/be
  STAGE: stg

jobs:
  build-push:
    name: Build & Push to Registry
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # [삭제] aws-actions/configure-aws-credentials
      # [삭제] aws-actions/amazon-ecr-login
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."${{ secrets.REGISTRY_URL }}"]
              http = true
              insecure = true

      - name: Compute version + tag
        id: meta
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME}"

          # TODO: 테스트 완료 후 삭제
          if [[ "$BRANCH" == "docker-ci-cd" || "$BRANCH" == "k8s-deploy" ]]; then
            VERSION="v0.0.0-test"
          else
            # e.g. release/v1.4.3 or hotfix/v1.4.3 → v1.4.3
            VERSION=$(echo "$BRANCH" | sed -E 's#^(release|hotfix)/##')

            if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version branch: $BRANCH"
              exit 1
            fi
          fi

          SHA=$(git rev-parse --short=7 HEAD)
          TAG="${{ env.STAGE }}-${VERSION}-${SHA}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          echo "Build Tag: $TAG"

      # 변경: ECR_REGISTRY → REGISTRY 환경변수
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.STAGE }}-current
          cache-from: type=gha
          cache-to: type=gha,mode=max

